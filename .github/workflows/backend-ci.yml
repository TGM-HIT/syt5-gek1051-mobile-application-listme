name: Backend CI

on:
  push:
    branches: [main, E2E-Cypress]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile
        working-directory: listme-backend
        run: ./mvnw compile -B

      - name: Test with coverage
        working-directory: listme-backend
        run: ./mvnw verify -B

      - name: Generate JaCoCo badge
        if: always()
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: listme-backend/target/site/jacoco/jacoco.csv
          badges-directory: listme-backend/target/site/jacoco/badges
          generate-coverage-badge: true
          badge-label: Backend Coverage

      - name: Publish coverage report to GitHub Pages
        if: github.event_name == 'push'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: listme-backend/target/site/jacoco
          target-folder: backend
          clean: false
