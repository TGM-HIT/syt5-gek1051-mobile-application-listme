name: Update STORIES.md

on:
  issues:
    types: [opened, closed, reopened]

jobs:
  update-stories-text:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write # Wichtig für die PR-Erstellung
      issues: read

    steps:
      - uses: actions/checkout@v4

      - name: Update STORIES.md File
        env:
          GH_ISSUE_NUM: ${{ github.event.issue.number }}
          GH_TITLE: ${{ github.event.issue.title }}
          GH_STATE: ${{ github.event.issue.state }}
        run: |
          python3 << 'EOF'
          import re, os, sys

          num = os.getenv('GH_ISSUE_NUM')
          title = os.getenv('GH_TITLE', '')
          state = os.getenv('GH_STATE', 'unknown')

          m = re.search(r'ID-(\d+)', title)
          if not m:
              sys.exit(0)

          story_id = str(int(m.group(1))) # "05" -> "5"

          with open('STORIES.md', 'r', encoding='utf-8') as f:
              lines = f.readlines()

          updated = False
          pattern = r'^\|\s*' + re.escape(story_id) + r'\s*\|'

          for i, line in enumerate(lines):
              if re.match(pattern, line):
                  cols = line.split('|')
                  if len(cols) >= 7:
                      # Überschreibt den Status-Text mit " open " oder " closed " (und Link zum Issue)
                      issue_link = f"[{state}](https://github.com/TGM-HIT/syt5-gek1051-mobile-application-listme/issues/{num})"
                      cols[6] = f" {issue_link} " 
                      lines[i] = "|".join(cols)
                      updated = True
                      break

          if updated:
              with open('STORIES.md', 'w', encoding='utf-8') as f:
                  f.writelines(lines)
          EOF

      # Dies erstellt einen automatischen Pull Request (umgeht die Branch Protection!)
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update issue #${{ github.event.issue.number }} to ${{ github.event.issue.state }}"
          title: "Update STORIES.md: Issue #${{ github.event.issue.number }} is ${{ github.event.issue.state }}"
          body: "Auto-updated by GitHub Actions. Please merge to update STORIES.md."
          branch: "update-stories-${{ github.event.issue.number }}"
          base: main
