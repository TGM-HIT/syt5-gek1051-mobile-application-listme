name: Update STORIES.md

on:
  issues:
    types: [opened, closed, reopened]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read

    steps:
      - uses: actions/checkout@v4

      - name: Update STORIES.md
        env:
          GH_ISSUE_NUM: ${{ github.event.issue.number }}
          GH_TITLE: ${{ github.event.issue.title }}
          GH_STATE: ${{ github.event.issue.state }}
        run: |
          python3 -c "
          import re, os
          num = os.getenv('GH_ISSUE_NUM')
          title = os.getenv('GH_TITLE', '')
          state = os.getenv('GH_STATE', 'unknown')
          print(f'🔍 Issue #{num}: \"{title}\" → {state}')
          
          m = re.search(r'ID-(\\\\d+)', title)
          if not m:
              print('❌ No ID-## in title')
              exit(0)
          
          raw_id = m.group(1)
          id = str(int(raw_id))
          print(f'📱 Stories ID {raw_id} → {id}')
          
          lines = open('STORIES.md').readlines()
          updated = False
          
          for i, line in enumerate(lines):
              if re.match(r'^\\|\\\\s*' + re.escape(id) + r'\\\\s*\\\\|', line.strip()):
                  cols = re.split(r'\\\\|', line.strip())
                  cols = [c.strip() for c in cols if c.strip()]
                  if len(cols) >= 6:
                      cols[5] = state
                      new_cols = [''] + cols + ['']
                      lines[i] = '| ' + ' | '.join(new_cols[:-1]) + ' |\n'
                      updated = True
                      print(f'✅ FIXED line {i}: ID {id} → {state}')
                      break
          
          if updated:
              open('STORIES.md', 'w').writelines(lines)
              print('💾 File saved!')
          else:
              print(f'❌ No | {id} | line found')
          "

      - name: Commit
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add STORIES.md
          if ! git diff --cached --quiet; then
            git commit -m "stories: #\${{ github.event.issue.number }} → \${{ github.event.issue.state }}"
            git push
          fi || echo 'No changes'
