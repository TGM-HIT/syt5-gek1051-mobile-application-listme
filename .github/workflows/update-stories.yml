- name: Update STORIES.md
  env:
    ISSUE_NUMBER: ${{ github.event.issue.number }}
    ISSUE_TITLE: ${{ github.event.issue.title }}
    ISSUE_STATE: ${{ github.event.issue.state }}
  run: |
    python3 << 'EOF'
    import re, os

    gh_issue_num = os.environ["ISSUE_NUMBER"]
    gh_issue_title = os.environ["ISSUE_TITLE"]
    issue_state = os.environ["ISSUE_STATE"]
    file_path = "STORIES.md"

    id_match = re.search(r'ID-(\d+)', gh_issue_title)
    if not id_match:
        print(f"Issue #{gh_issue_num}: Keine ID → Skip")
        exit(0)
    
    stories_id_raw = id_match.group(1)  # "05"
    stories_id = str(int(stories_id_raw))  # "05" → 5 (Zeros weg!)
    
    print(f"Issue #{gh_issue_num} '{gh_issue_title}' → Stories ID: '{stories_id_raw}' → '{stories_id}'")

    with open(file_path, "r", encoding="utf-8") as f:
        lines = f.readlines()

    updated = False
    for i, line in enumerate(lines):
        line_stripped = line.strip()
        if re.match(r'^\|\s*' + stories_id + r'\s*\|', line_stripped):
            # Saubere Spalten-Extraktion
            cols = re.split(r'\s*\|\s*', line_stripped)
            if len(cols) >= 6:  # Mind. 6 Spalten (ID,Desc,SP,HEAD,Prio,Status)
                cols[5] = issue_state  # Status ist Index 5
                new_line = "| " + " | ".join(cols) + " |"
                lines[i] = new_line + "\n"
                updated = True
                break

    if updated:
        with open(file_path, "w", encoding="utf-8") as f:
            f.writelines(lines)
        print(f"✅ Stories ID {stories_id} → '{issue_state}'")
    else:
        print(f"❌ Stories Zeile '| {stories_id} |' nicht gefunden")
    EOF
