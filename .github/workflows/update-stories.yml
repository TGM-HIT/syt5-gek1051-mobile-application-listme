name: Update STORIES.md on Issue Change

on:
  issues:
    types: [opened, closed, reopened]

jobs:
  update-stories:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update STORIES.md
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_STATE: ${{ github.event.issue.state }}
        run: |
          python3 << 'EOF'
          import re, os

          gh_issue_num = os.environ["ISSUE_NUMBER"]
          gh_issue_title = os.environ["ISSUE_TITLE"]
          issue_state = os.environ["ISSUE_STATE"]
          file_path = "STORIES.md"  # ← Groß, Root

          id_match = re.search(r'ID-(\d+)', gh_issue_title)
          if not id_match:
              print(f"Issue #{gh_issue_num}: Keine ID in '{gh_issue_title}' → Skip")
              exit(0)
          
          stories_id = id_match.group(1)
          print(f"Issue #{gh_issue_num} '{gh_issue_title}' → Stories ID: {stories_id}")

          try:
              with open(file_path, "r", encoding="utf-8") as f:
                  lines = f.readlines()
          except FileNotFoundError:
              print(f"STORIES.md nicht gefunden!")
              exit(1)

          updated = False
          for i, line in enumerate(lines):
              if re.match(r'^\|\s*' + stories_id + r'\s*\|', line.strip()):
                  cols = [c.strip() for c in line.split("|")]
                  cols[-2] = issue_state  # Status-Spalte
                  lines[i] = "|".join([""] + cols) + "\n"
                  updated = True
                  break

          if updated:
              with open(file_path, "w", encoding="utf-8") as f:
                  f.writelines(lines)
              print(f"✅ Stories ID {stories_id} → '{issue_state}'")
          else:
              print(f"❌ Stories ID {stories_id} nicht in STORIES.md gefunden")
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add STORIES.md
          git diff --cached --quiet || git commit -m "chore: update STORIES.md issue #${{ github.event.issue.number }} (${{ github.event.issue.state }})"
          git push
