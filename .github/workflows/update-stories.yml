name: Update Stories.md on Issue Change

on:
  issues:
    types: [opened, closed, reopened]

jobs:
  update-stories:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Stories.md
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_STATE: ${{ github.event.issue.state }}
        run: |
          python3 << 'EOF'
          import re, os

          issue_number = os.environ["ISSUE_NUMBER"]
          issue_state  = os.environ["ISSUE_STATE"]   # "open" oder "closed"
          file_path    = "Stories.md"

          with open(file_path, "r", encoding="utf-8") as f:
              lines = f.readlines()

          updated = False
          new_lines = []
          for line in lines:
              # Zeile muss mit | <nummer> | beginnen
              if re.match(r'^\|\s*' + re.escape(issue_number) + r'\s*\|', line):
                  # Spalten aufteilen
                  cols = line.split("|")
                  # Status ist die letzte nicht-leere Spalte (Index -2)
                  cols[-2] = f" {issue_state} "
                  line = "|".join(cols)
                  updated = True
              new_lines.append(line)

          if updated:
              with open(file_path, "w", encoding="utf-8") as f:
                  f.writelines(new_lines)
              print(f"Issue #{issue_number} → '{issue_state}' in Stories.md gesetzt.")
          else:
              print(f"Issue #{issue_number} nicht in Stories.md gefunden.")
          EOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Stories.md
          git diff --cached --quiet || git commit -m "chore: set issue #${{ github.event.issue.number }} to ${{ github.event.issue.state }} in Stories.md"
          git push
