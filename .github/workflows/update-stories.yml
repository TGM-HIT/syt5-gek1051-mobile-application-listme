name: Update Issue Status Badge on GH-Pages

on:
  issues:
    types: [opened, closed, reopened]

jobs:
  update-status:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Wichtig für gh-pages Push
      issues: read

    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages # Wir checken direkt gh-pages aus!
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Badge JSON
        env:
          GH_ISSUE_NUM: ${{ github.event.issue.number }}
          GH_TITLE: ${{ github.event.issue.title }}
          GH_STATE: ${{ github.event.issue.state }}
        run: |
          python3 << 'EOF'
          import os, json, re, sys

          num = os.getenv('GH_ISSUE_NUM')
          title = os.getenv('GH_TITLE', '')
          state = os.getenv('GH_STATE', 'unknown')

          # ID aus dem Titel extrahieren
          m = re.search(r'ID-(\d+)', title)
          if not m:
              print('❌ No ID-## in title found')
              sys.exit(0)

          story_id = str(int(m.group(1))) # "05" -> "5"

          # Ordnerstruktur erstellen
          os.makedirs('status', exist_ok=True)
          file_path = f'status/{story_id}.json'

          # Shields.io Endpoint JSON Format generieren
          # Farben: Grün für Open, Rot/Lila für Closed
          color = "green" if state == "open" else "red"
          
          badge_data = {
              "schemaVersion": 1,
              "label": "Status",
              "message": state,
              "color": color
          }

          # JSON speichern
          with open(file_path, 'w') as f:
              json.dump(badge_data, f)
              
          print(f"✅ Created {file_path} with state '{state}'")
          EOF

      - name: Commit and Push to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add status/*.json
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update badge for issue #${{ github.event.issue.number }} (${{ github.event.issue.state }})"
            git push origin gh-pages
          fi
