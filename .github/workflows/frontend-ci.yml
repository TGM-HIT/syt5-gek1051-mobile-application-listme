name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'listme-frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'listme-frontend/**'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: listme-frontend/package-lock.json

      - name: Install dependencies
        working-directory: listme-frontend
        run: npm install

      - name: Type check
        working-directory: listme-frontend
        run: npx vue-tsc --noEmit

      - name: Build
        working-directory: listme-frontend
        run: npx vite build

      - name: Run tests with coverage
        working-directory: listme-frontend
        run: npm run test:run -- --passWithNoTests --coverage

      - name: Generate frontend coverage badge
        if: always()
        run: |
          mkdir -p frontend-report/badges
          if [ -f listme-frontend/coverage/coverage-summary.json ]; then
            PCT=$(node -e "const s=require('./listme-frontend/coverage/coverage-summary.json');console.log(Math.round(s.total.lines.pct))")
            if   [ "$PCT" -ge 80 ]; then COLOR="3fb950"
            elif [ "$PCT" -ge 60 ]; then COLOR="d29922"
            else COLOR="f85149"; fi
            curl -sf "https://img.shields.io/badge/coverage-${PCT}%25-${COLOR}?style=flat" \
              -o frontend-report/badges/coverage.svg \
              || printf '<svg xmlns="http://www.w3.org/2000/svg" width="110" height="20"><rect width="110" height="20" rx="3" fill="%s"/><text x="6" y="14" font-family="sans-serif" font-size="11" fill="#fff">coverage: %s%%</text></svg>' "#$COLOR" "$PCT" > frontend-report/badges/coverage.svg
          else
            curl -sf "https://img.shields.io/badge/coverage-unknown-6e7681?style=flat" \
              -o frontend-report/badges/coverage.svg || true
          fi

      - name: Publish coverage badge to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: frontend-report
          target-folder: frontend
          clean: false
