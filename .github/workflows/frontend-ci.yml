name: Frontend CI

on:
  push:
    branches: [main, E2E-Cypress]
    paths:
      - 'listme-frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'listme-frontend/**'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: listme-frontend/package-lock.json

      - name: Install dependencies
        working-directory: listme-frontend
        run: npm install

      - name: Build
        working-directory: listme-frontend
        run: npm run build

      - name: Run tests with coverage
        working-directory: listme-frontend
        run: npm run test:run -- --passWithNoTests --coverage

      - name: Run E2E tests
        id: e2e
        working-directory: listme-frontend
        run: npm run cypress:run

      - name: Generate frontend coverage and E2E status badges
        if: always()
        run: |
          mkdir -p frontend-report/badges
          
          # Copy HTML coverage report to the report folder
          if [ -d listme-frontend/coverage ]; then
            cp -r listme-frontend/coverage/* frontend-report/
          fi
          
          # Coverage Badge
          if [ -f listme-frontend/coverage/coverage-summary.json ]; then
            PCT=$(node -e "const s=require('./listme-frontend/coverage/coverage-summary.json');console.log(Math.round(s.total.lines.pct))")
            if   [ "$PCT" -ge 80 ]; then COLOR="3fb950"
            elif [ "$PCT" -ge 60 ]; then COLOR="d29922"
            else COLOR="f85149"; fi
            curl -sf "https://img.shields.io/badge/Frontend%20Coverage-${PCT}%25-${COLOR}?style=flat&logo=vuedotjs&logoColor=white" \
              -o frontend-report/badges/coverage.svg \
              || printf '<svg xmlns="http://www.w3.org/2000/svg" width="160" height="20"><rect width="160" height="20" rx="3" fill="%s"/><text x="6" y="14" font-family="sans-serif" font-size="11" fill="#fff">Frontend Coverage: %s%%</text></svg>' "#$COLOR" "$PCT" > frontend-report/badges/coverage.svg
          else
            curl -sf "https://img.shields.io/badge/Frontend%20Coverage-unknown-6e7681?style=flat&logo=vuedotjs&logoColor=white" \
              -o frontend-report/badges/coverage.svg || true
          fi

          # E2E Status Badge
          # Check if the previous step (Run E2E tests) succeeded
          if [ "${{ steps.e2e.outcome }}" == "success" ]; then
            E2E_COLOR="3fb950"
            E2E_STATUS="passing"
          else
            E2E_COLOR="f85149"
            E2E_STATUS="failing"
          fi
          curl -sf "https://img.shields.io/badge/E2E%20Tests-${E2E_STATUS}-${E2E_COLOR}?style=flat&logo=cypress&logoColor=white" \
            -o frontend-report/badges/e2e.svg \
            || printf '<svg xmlns="http://www.w3.org/2000/svg" width="120" height="20"><rect width="120" height="20" rx="3" fill="%s"/><text x="6" y="14" font-family="sans-serif" font-size="11" fill="#fff">E2E Tests: %s</text></svg>' "#$E2E_COLOR" "$E2E_STATUS" > frontend-report/badges/e2e.svg

      - name: Publish badges to GitHub Pages
        if: github.event_name == 'push'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: frontend-report
          target-folder: frontend
          clean: false
