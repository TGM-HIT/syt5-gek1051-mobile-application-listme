services:
  postgres:
    image: postgres:16-alpine
    container_name: listme-db
    environment:
      POSTGRES_DB: listme
      POSTGRES_USER: listme
      POSTGRES_PASSWORD: listme
    ports:
      - "5432:5432"
    volumes:
      - listme-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U listme"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: maven:3.9-eclipse-temurin-17
    container_name: listme-backend
    working_dir: /app
    volumes:
      - ./listme-backend:/app
      - maven-cache:/root/.m2
    ports:
      - "8080:8080"
    command: mvn spring-boot:run
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/listme
      SPRING_DATASOURCE_USERNAME: listme
      SPRING_DATASOURCE_PASSWORD: listme

  frontend:
    image: node:20-alpine
    container_name: listme-frontend
    working_dir: /app
    volumes:
      - ./listme-frontend:/app
      - frontend-node-modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend
    environment:
      API_URL: http://backend:8080

volumes:
  listme-pgdata:
  maven-cache:
  frontend-node-modules:
