spring.application.name=listme-backend

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/listme
spring.datasource.username=listme
spring.datasource.password=listme
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Jackson (Spring Boot 4 / Jackson 3)
spring.jackson.datetime.write-dates-as-timestamps=false

# Server
server.port=8080

# Logging
logging.level.com.oliwier.listmebackend=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
